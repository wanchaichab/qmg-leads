<!doctype html>
<html>
  <head>
    <title>Batch Runner</title>
  </head>
  <body>
    <h1>Batch Runner</h1>

    <button onclick="runBatch()">Run Batch</button>

    <script>
      async function runBatch() {
        const res = await fetch("/run-batch", { method: "POST" });
        const data = await res.json();
        alert(data.message);
      }
    </script>
  </body>
</html>
